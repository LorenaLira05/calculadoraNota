<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boletim Escolar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Boletim Escolar</h1>
    <p class="subtitle">Preencha as notas e clique em <strong>Resumo</strong>.</p>

    <section class="grid">
      <label>
        Nota 1
        <input id="n1" type="number" step="0.01" min="0" max="10" value="5" />
      </label>
      <label>
        Nota 2
        <input id="n2" type="number" step="0.01" min="0" max="10" value="10" />
      </label>
      <label>
        Nota 3
        <input id="n3" type="number" step="0.01" min="0" max="10" value="10" />
      </label>
      <label>
        Nota 4
        <input id="n4" type="number" step="0.01" min="0" max="10" value="10" />
      </label>
    </section>

    <section id="extraNotas" class="extra-notas">
      <label>
        Nota Recuperação
        <input id="nrec" type="number" step="0.01" min="0" max="10" placeholder="Opcional" />
      </label>
      <label>
        Nota Final
        <input id="nfinal" type="number" step="0.01" min="0" max="10" placeholder="Opcional" />
      </label>
    </section>

    <button id="btnResumo" type="button">Resumo</button>
    <p id="erro" class="erro"></p>
    <article id="resultado" class="resumo">Nenhum resumo gerado ainda.</article>
  </main>

  <script src="script.js"></script>
</body>
</html>
